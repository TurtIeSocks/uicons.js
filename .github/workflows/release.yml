name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write # semantic-release git plugin push + GitHub release/tag
  issues: write # semantic-release github plugin success comments
  pull-requests: write # semantic-release github plugin success comments
  id-token: write # OIDC trusted publishing to npm (no token needed)

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4.0.2
        with:
          node-version: 22 # OIDC trusted publishing requires Node >= 22.14.0
          registry-url: https://registry.npmjs.org/
      - name: Upgrade npm for OIDC
        run: npm install -g npm@latest # trusted publishing requires npm >= 11.5.1
      - run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install
        env:
          HUSKY: 0
      - name: Run tests
        run: pnpm run test
      - name: Build app
        run: pnpm run build:ts
      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
        run: npx semantic-release
